<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/sigh up.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="./assets/images/favicon.png">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card animate-slide" data-aos="zoom-in">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fas fa-hand-holding-medical"></i>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join ElderConnect and start your journey</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label">I am a...</label>
          <div class="role-selector">
            <div class="role-option active" data-role="patient">
              <i class="fas fa-user"></i>
              <span>Patient</span>
            </div>
            <div class="role-option" data-role="nurse">
              <i class="fas fa-user-nurse"></i>
              <span>Nurse</span>
            </div>
            <div class="role-option" data-role="oah_manager">
              <i class="fas fa-building"></i>
              <span>Old age home</span>
            </div>
          </div>
          <input type="hidden" id="role" value="patient" />
        </div>

        <div class="form-group" id="fullNameGroup">
          <label class="form-label" id="nameLabel">Full Name</label>
          <input type="text" class="form-input" id="fullName" placeholder="Irfana Nasrin" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="username" placeholder="Irfahis" required />
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-input" id="phone" placeholder="9167894327" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="your.email@example.com" required />
        </div>

        <!-- Nurse Specific Fields -->
        <div id="nurseFields" style="display: none;">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Nursing License Number</label>
              <input type="text" class="form-input" id="licenseNumber" placeholder="NL123456" />
            </div>
            <div class="form-group">
              <label class="form-label">Experience (Years)</label>
              <input type="number" class="form-input" id="experienceYears" placeholder="2" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Qualification</label>
              <select class="form-input" id="qualification">
                <option value="">Select Qualification</option>
                <option value="GNM">GNM</option>
                <option value="BSc Nursing">BSc Nursing</option>
                <option value="Diploma">Diploma</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Specialization</label>
              <select class="form-input" id="specialization">
                <option value="">Select Specialization</option>
                <option value="Elder care">Elder care</option>
                <option value="ICU care">ICU care</option>
                <option value="Bedridden patient care">Bedridden patient care</option>
                <option value="Post-surgery care">Post-surgery care</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Government ID Upload (Aadhar / PAN)</label>
            <input type="file" class="form-input" id="governmentIdFile" accept="image/*,.pdf" />
          </div>
        </div>

        <!-- OAH Specific Fields -->
        <div id="oahFields" style="display: none;">
          <div class="form-group">
            <label class="form-label">Total Beds</label>
            <input type="number" class="form-input" id="totalBeds" placeholder="50" />
          </div>
          <div class="form-group">
            <label class="form-label">Registration Certificate Upload</label>
            <input type="file" class="form-input" id="regCertificateFile" accept="image/*,.pdf" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input password-input" id="password"
              placeholder="Create a strong password" required />
            <i class="fas fa-eye-slash password-toggle" onclick="togglePasswordVisibility('password', this)"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" class="form-input" id="address" placeholder="City, State" />
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account?
        <a href="login.html" class="auth-link">Sign In</a>
      </div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/signup.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 800,
      once: true
    });
  </script>
</body>

</html>
